#
# RR-S-12 CI quality gate. Self-contained (inline bash + python3 stdlib only); never
# executes checked-out repository code. Runs on push to main and on every PR.
# Mirrors tooling/check_release.py (leak sentinels, link policy with signpost
# exemption, frontmatter lint, catalog validity).
name: validate

on:
  push:
    branches: [ main ]
  pull_request:

permissions: read-all

jobs:
  content-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Content integrity check (leak sentinels)
        run: |
          set -e
          hits=0
          # Sentinels assembled from fragments so this workflow file does not flag itself.
          for sentinel in "CONFI""DENTIAL" "BEGIN ""PRIVATE KEY" "BEGIN OPENSSH ""PRIVATE KEY" "BEGIN RSA ""PRIVATE KEY"; do
            if grep -RIn --exclude-dir=.git "$sentinel" .; then
              echo "::error::leak sentinel found: $sentinel"
              hits=1
            fi
          done
          test "$hits" -eq 0

      - name: Link policy check (no source-material URLs)
        run: |
          python3 - <<'PY'
          # Mirror tooling/check_release.py: source-material URLs are banned everywhere
          # EXCEPT inside a `kind: signpost` pack, which is pure citation by design.
          import re, sys, pathlib
          HOSTS = re.compile(r"https?://[^\s)\"']*(sebokwiki|nasa\.gov|ntrs|nist\.gov|"
                             r"govinfo\.gov|omg\.org|ocw\.mit|dodcio|dod\.mil|dla\.mil|"
                             r"eur-lex|europa\.eu|nato\.int|dau\.edu)")
          root = pathlib.Path(".")
          signpost_dirs = {
              p.parent for p in root.glob("packs/*/SKILL.md")
              if re.search(r"^kind:\s*signpost\s*$", p.read_text(encoding="utf-8", errors="ignore"), re.M)
          }
          fails = 0
          for p in root.rglob("*"):
              if p.suffix not in {".md", ".json", ".yaml", ".yml", ".txt"} or ".git" in p.parts:
                  continue
              if p.parent in signpost_dirs:
                  continue
              m = HOSTS.search(p.read_text(encoding="utf-8", errors="ignore"))
              if m:
                  print(f"::error file={p}::source-material URL: {m.group(0)} (see docs/LICENSING.md)")
                  fails += 1
          print("no source-material links" if not fails else f"{fails} link-policy violation(s)")
          sys.exit(1 if fails else 0)
          PY

      - name: Pack frontmatter lint
        run: |
          python3 - <<'PY'
          import glob, re, sys
          fails = 0
          for f in glob.glob("packs/*/SKILL.md"):
              t = open(f, encoding="utf-8").read()
              m = re.match(r"^---\s*\n(.*?)\n---\s*\n", t, re.S)
              if not m:
                  print(f"::error file={f}::no YAML frontmatter"); fails += 1; continue
              fm = m.group(1)
              name = re.search(r"^name:\s*(\S+)", fm, re.M)
              if not name:
                  print(f"::error file={f}::frontmatter missing name"); fails += 1
              elif not re.fullmatch(r"[a-z0-9]+(-[a-z0-9]+)*", name.group(1).strip().strip('\"\'')):
                  print(f"::error file={f}::name not kebab-case: {name.group(1)}"); fails += 1
              if not re.search(r"^description:\s*\S", fm, re.M):
                  print(f"::error file={f}::frontmatter missing description"); fails += 1
          sys.exit(1 if fails else 0)
          PY

      - name: Catalog JSON valid
        run: python3 -c "import json; json.load(open('catalog.json')); print('catalog.json OK')"
